exclude = [
    ".git",
    ".ruff_cache",
    ".venv",
    "venv",
    "__pypackages__",
    "build",
    "dist",
]

line-length = 100
target-version = "py312"

[lint]
select = [
    "E", # pycodestyle errors
    "W", # pycodestyle warnings
    "F", # pyflakes
    "I", # isort
    "C", # flake8-comprehensions
    "B", # flake8-bugbear
    "PLC0415", # import outside toplevel
]
ignore = [
    "B008", # do not perform function calls in argument defaults (FastMCP/FastAPI Depends)
    "C901", # complexity
    "E501", # line too long
]

dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"
mccabe.max-complexity = 10

[lint.isort]
known-first-party = ["tg_mcp"]
known-third-party = ["fastmcp", "pydantic", "pydantic_settings", "telethon"]

[lint.per-file-ignores]
"__init__.py" = ["F401"]
