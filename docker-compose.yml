services:
  postgres:
    image: postgres:18-alpine
    environment:
      - POSTGRES_USER=tgmcp
      - POSTGRES_PASSWORD=tgmcp
      - POSTGRES_DB=tgmcp
    volumes:
      - ./data/postgres:/var/lib/postgresql
    ports:
      - "5432:5432"

  tg-mcp:
    image: ghcr.io/myrikld/tg-mcp:latest
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8000
      - MCP_PATH=/mcp
      - MCP_DB_URL=postgresql+asyncpg://tgmcp:tgmcp@postgres/tgmcp
    depends_on:
      - postgres
